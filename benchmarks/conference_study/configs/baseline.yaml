# Baseline run config for the quality-proxy study.
# Results -> benchmarks/conference_study/results/baseline/
# Log    -> benchmarks/conference_study/results/baseline/run_log.jsonl

name: baseline

# Paper set. Regenerate the full canonical manifest with select_papers.py
# (deterministic, seed 42), or point at manifests/canonical/frontier.json
# for the 74-paper frontier subset.
manifest: manifests/canonical/full.json

# Backbone models. These four efficient models run on the full set. The two
# frontier models (openai/gpt-5.5, anthropic/claude-opus-4.7) run only on the
# frontier subset; for that run, point `manifest` at
# manifests/canonical/frontier.json and add them here.
models:
  - deepseek/deepseek-v4-flash
  - qwen/qwen3.6-35b-a3b
  - google/gemini-3.1-flash-lite-preview
  - x-ai/grok-4.1-fast

# Review caps passed to the openaireview CLI.
max_pages: 20
max_tokens: 20000

# Batch runner knobs.
timeout_sec: 3600      # 60 min per (paper, model) subprocess
max_per_model: 2       # concurrent runs per model
