# Per-domain perturbation benchmark config for the cs_CC split.
# Run every domain at once: run_benchmark.py --configs configs/full_*.yaml
#
# input_dir:   injected papers + filtered manifests (the released set), resolved
#              relative to the repo root.
# results_dir: where staged papers, reviews, and scores land.
system: openaireview
input_dir: benchmarks/perturbation/data/perturbations_filtered/cs_CC/all
results_dir: results/full_cs_CC

# Backbone models reviewed (the paper's six). Trim for a cheaper smoke run.
models:
  - openai/gpt-5.5
  - anthropic/claude-opus-4.7
  - x-ai/grok-4.1-fast
  - deepseek/deepseek-v4-flash
  - qwen/qwen3.6-35b-a3b
  - google/gemini-3.1-flash-lite-preview

methods:
  - zero_shot
  - progressive

# Scoring: an LLM judge (Gemini-3 Flash Preview) rates each comment that passes a
# fuzzy substring match against the perturbed text.
score_method: llm
score_model: google/gemini-3-flash-preview
