# Config for analyses/compare_substantive_guidance.py 10-paper run.
#
# Usage:
#   python benchmarks/perturbation/analyses/compare_substantive_guidance.py \
#     benchmarks/perturbation/configs/compare_substantive_guidance_10papers.yaml
#
# First-pass setup: gemini-3-flash for both generator and verifier to keep
# cost low. The comparison script overrides substantive_guidance per variant.

max_papers: 10
length: short

error_type: surface
score_method: llm

perturb_model: google/gemini-3-flash-preview
score_model: google/gemini-3-flash-preview

context_mode: window
substantive_guidance: true   # overridden per variant by the comparison script
context_window: 200
related_passages_max: 5

verifier_model: anthropic/claude-sonnet-4-6
verifier_reasoning: none
verifier_max_workers: 8
skip_verifier: false

review_models:
  - google/gemini-3-flash-preview

review_methods:
  - zero_shot
  - local
  - progressive

results_dir: benchmarks/perturbation/results/short
