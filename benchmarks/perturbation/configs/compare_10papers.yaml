# Config for analyses/compare_context_modes.py 10-paper run.
#
# Usage:
#   python benchmarks/perturbation/analyses/compare_context_modes.py \
#     benchmarks/perturbation/configs/compare_10papers.yaml
#
# Generator: gemini-3-flash (cheap). Verifier: production sonnet-4-6 @ reasoning=none.
# Pass --modes window,related to skip the (low-signal) none mode.

max_papers: 10
length: short

error_type: surface
score_method: llm

perturb_model: google/gemini-3-flash-preview
score_model: google/gemini-3-flash-preview

context_mode: related    # overridden per mode by the comparison script
context_window: 200
related_passages_max: 5

verifier_model: anthropic/claude-sonnet-4-6
verifier_reasoning: none
verifier_max_workers: 8
skip_verifier: false

review_models:
  - google/gemini-3-flash-preview

review_methods:
  - zero_shot
  - local
  - progressive

results_dir: benchmarks/perturbation/results/short
