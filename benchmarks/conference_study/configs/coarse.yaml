# coarse competitor run config.
# Results -> benchmarks/conference_study/results/coarse/
# Log    -> benchmarks/conference_study/results/coarse/run_log.jsonl
#
# Prerequisites:
#   - coarse installed in its own venv at `venv_python` below
#   - OPENROUTER_API_KEY set in env (coarse routes all backbone models
#     through OpenRouter)

name: coarse
competitor: coarse

# Backbone models (same efficient roster as the baseline run).
models:
  - deepseek/deepseek-v4-flash
  - qwen/qwen3.6-35b-a3b
  - google/gemini-3.1-flash-lite-preview
  - x-ai/grok-4.1-fast

# The adapter subprocess-calls a runner inside coarse's own venv so its deps
# (litellm, instructor, docling, ...) stay isolated from openaireview's. Point
# the COARSE_VENV_PYTHON env var at that venv's python (see the README section
# "Running the coarse competitor"). To hardcode it instead, set `venv_python:`.

# Batch runner knobs.
timeout_sec: 1800      # 30 min per (paper, model) run (coarse is 2-5 min typical)
max_per_model: 2       # concurrent runs per model (matches baseline's rate-limit headroom)

# Adapter-specific options forwarded to CoarseAdapter.review(cfg=...).
coarse_options:
  skip_cost_gate: true
