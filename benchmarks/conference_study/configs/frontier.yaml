# Frontier-subset run config for the quality-proxy study.
# Runs all six backbone models on the 74-paper frontier subset, the set the
# paper mainly reports on. The two frontier models (gpt-5.5, claude-opus-4.7)
# are too expensive for the full set, so they appear only here.
# The frontier manifest is not shipped; request it from the authors.
# Results -> benchmarks/conference_study/results/frontier/

name: frontier

manifest: manifests/canonical/frontier.json

models:
  - deepseek/deepseek-v4-flash
  - qwen/qwen3.6-35b-a3b
  - google/gemini-3.1-flash-lite-preview
  - x-ai/grok-4.1-fast
  - openai/gpt-5.5
  - anthropic/claude-opus-4.7

# Review caps passed to the openaireview CLI.
max_pages: 20
max_tokens: 20000

# Batch runner knobs.
timeout_sec: 3600
max_per_model: 2
