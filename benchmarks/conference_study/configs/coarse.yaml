# coarse competitor run config.
# Results -> benchmarks/conference_study/results/coarse/
# Log    -> benchmarks/conference_study/results/coarse/run_log.jsonl
#
# Prerequisites:
#   - coarse installed in its own venv at `venv_python` below
#   - OPENROUTER_API_KEY set in env (coarse routes all three manifest models
#     through OpenRouter)

name: coarse
competitor: coarse

# Path to the coarse venv's python. The adapter subprocess-calls a runner
# inside this venv so coarse's deps (litellm, instructor, docling, ...) stay
# isolated from openaireview's venv.
venv_python: /data/dangnguyen/openaireview_project/coarse/.venv/bin/python

# Batch runner knobs.
timeout_sec: 1800      # 30 min per (paper, model) run (coarse is 2-5 min typical)
max_per_model: 2       # concurrent runs per model (matches baseline's rate-limit headroom)

# Adapter-specific options forwarded to CoarseAdapter.review(cfg=...).
coarse_options:
  skip_cost_gate: true
