# Default config for benchmarks/perturbation/run_pipeline.py
#
# Usage:
#   python run_pipeline.py configs/default.yaml
#
# To run a variant, copy this file, edit, and point at the new file.
# Committed configs serve as the experiment log.

max_papers: 2
length: short          # short (2k-7k words) | medium (7k-17k) | long (>17k)

error_type: surface    # surface | formal | all
score_method: llm      # llm | fuzzy | semantic

perturb_model: google/gemini-3-flash-preview
score_model: google/gemini-3-flash-preview

# Generator context provision (how much of the paper to show per candidate):
#   none    - empty context; pure baseline
#   window  - ±context_window chars around the span (legacy behavior)
#   related - window + whole-paper related passages that reference the same
#             symbols/names (recommended for substantive-error generation)
context_mode: window
context_window: 200
related_passages_max: 5

# Substantive-error verifier (validation test #5). Runs after the 4 structural
# tests. Strong-model oracle that drops typo-shaped / not-an-error perturbations.
verifier_model: anthropic/claude-sonnet-4-6
verifier_reasoning: none            # none | low | medium | high
verifier_max_workers: 8
skip_verifier: false

review_models:
  - google/gemini-3-flash-preview

review_methods:
  - zero_shot
  - local
  - progressive

results_dir: benchmarks/perturbation/results
